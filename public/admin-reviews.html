<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8">
  <title>إدارة المراجعات - أنوار القرآن</title>
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="css/font-awesome.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/templatemo-style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/4.2.0/firebase.js"></script>
  <script src="js/constants.js"></script>
  <script src="js/reviews.js"></script>
</head>

<body>
  <div class="container" style="margin-top: 50px;">
    <div class="row">
      <div class="col-md-12">
        <h1 class="text-center">إدارة مراجعات المستخدمين</h1>
        <p class="text-center" dir="rtl">مراجعة وإدارة المراجعات المقدمة من المستخدمين</p>
      </div>
    </div>

    <div class="row">
      <div class="col-md-12">
        <div class="panel panel-default">
          <div class="panel-heading">
            <h3 dir="rtl">المراجعات المعلقة</h3>
          </div>
          <div class="panel-body">
            <div id="pendingReviews">
              <p dir="rtl" class="text-center">جاري تحميل المراجعات...</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-12">
        <div class="panel panel-default">
          <div class="panel-heading">
            <h3 dir="rtl">المراجعات المعتمدة</h3>
          </div>
          <div class="panel-body">
            <div id="approvedReviews">
              <p dir="rtl" class="text-center">جاري تحميل المراجعات...</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Review Modal -->
  <div class="modal fade" id="reviewModal" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <button type="button" class="close" data-dismiss="modal">&times;</button>
          <h4 class="modal-title" dir="rtl">تفاصيل المراجعة</h4>
        </div>
        <div class="modal-body" id="reviewModalBody">
          <!-- Review details will be loaded here -->
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-danger" id="rejectReviewBtn">رفض المراجعة</button>
          <button type="button" class="btn btn-success" id="approveReviewBtn">اعتماد المراجعة</button>
          <button type="button" class="btn btn-default" data-dismiss="modal">إغلاق</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/jquery.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/admin-reviews.js"></script>
</body>

</html>
