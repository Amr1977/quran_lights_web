    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --card-bg: #2d2d2d;
            --accent: #28a7e9;
            --accent-green: #1df52f;
        }

        * { box-sizing: border-box; }

        html {
            background: var(--bg-color);
            text-align: center;
            font-size: 10px;
        }

        body {
            margin: 0;
            font-size: 2rem;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Open Sans', sans-serif;
        }

        .age-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .age-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .age-title {
            color: var(--accent);
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .clock {
            width: min(85vw, 50rem);
            height: min(85vw, 50rem);
            aspect-ratio: 1;
            border: 6px solid #333;
            box-shadow: -4px -4px 10px rgba(67,67,67,0.5),
                        inset 4px 4px 10px rgba(0,0,0,0.5),
                        inset -4px -4px 10px rgba(67,67,67,0.5),
                        4px 4px 10px rgba(0,0,0,0.3);
            border-radius: 50%;
            margin: 10px auto;
            position: relative;
            padding: 2rem;
            box-sizing: border-box;
        }

        .outer-clock-face {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 100%;
            background: var(--bg-color);
            overflow: hidden;
        }

        .outer-clock-face::after {
            -webkit-transform: rotate(90deg);
            -moz-transform: rotate(90deg);
            transform: rotate(90deg);
        }

        .outer-clock-face::before,
        .outer-clock-face::after,
        .outer-clock-face .marking {
            content: '';
            position: absolute;
            width: 5px;
            height: 100%;
            background: var(--accent-green);
            z-index: 0;
            left: 49%;
        }

        .outer-clock-face .marking {
            background: #555;
            width: 3px;
        }

        .outer-clock-face .marking.marking-one { transform: rotate(30deg); }
        .outer-clock-face .marking.marking-two { transform: rotate(60deg); }
        .outer-clock-face .marking.marking-three { transform: rotate(120deg); }
        .outer-clock-face .marking.marking-four { transform: rotate(150deg); }

        .inner-clock-face {
            position: absolute;
            top: 10%;
            left: 10%;
            width: 80%;
            height: 80%;
            background: var(--bg-color);
            border-radius: 100%;
            z-index: 1;
        }

        .inner-clock-face::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-left: -7px;
            margin-top: -7px;
            background: #4d4b63;
            z-index: 11;
        }

        .hand {
            width: 50%;
            right: 50%;
            height: 6px;
            background: #61afff;
            position: absolute;
            top: 50%;
            border-radius: 6px;
            transform-origin: 100%;
            transform: rotate(90deg);
            transition-timing-function: cubic-bezier(0.1, 2.7, 0.58, 1);
        }

        .hand.hour-hand { width: 30%; z-index: 3; }
        .hand.min-hand { height: 3px; z-index: 10; width: 40%; }
        .hand.second-hand { background: #ee791a; width: 45%; height: 2px; }

        .age-form {
            margin: 20px auto;
            text-align: center;
        }

        .age-form label {
            color: var(--accent-green);
            font-size: 16px;
            display: block;
            margin-bottom: 8px;
        }

        .age-form input[type=date] {
            font-size: 16px;
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: #fff;
            max-width: 100%;
            width: 260px;
            outline: none;
            transition: border-color 0.2s;
        }

        .age-form input[type=date]:focus {
            border-color: var(--accent);
        }

        .age-text {
            color: var(--accent-green);
            font-size: 18px;
            font-weight: 600;
            margin: 20px 0;
            min-height: 28px;
            direction: auto;
            unicode-bidi: plaintext;
        }

        .age-footer-links {
            margin-top: 24px;
        }

        .age-footer-links a {
            color: var(--accent);
            font-size: 14px;
            text-decoration: none;
            margin: 0 10px;
            transition: opacity 0.2s;
        }

        .age-footer-links a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        @media screen and (max-width: 480px) {
            html { font-size: 9px; }
            .clock { padding: 1rem; }
            .age-form input[type=date] { font-size: 14px; padding: 10px 16px; width: 220px; }
            .age-text { font-size: 15px; }
            .age-title { font-size: 15px; }
        }
    </style>
</head>

    <!-- Main -->
    <div class="age-main" style="padding-top: 90px;">
        <div class="age-container">
            <div class="age-title" data-i18n="age.title">كم عمرك على وجه الأرض؟</div>

            <div class="clock">
                <div class="outer-clock-face">
                    <div class="marking marking-one"></div>
                    <div class="marking marking-two"></div>
                    <div class="marking marking-three"></div>

            <div class="age-form">
                <label for="birthday" id="label_text" data-i18n="age.label">أدخل تاريخ ميلادك:</label>

    <script src="js/jquery.js?v=1782251449"></script>
    <script src="js/bootstrap.min.js?v=1782251449"></script>

    <script>
        var birth_date;

        function init_birth() {
            birth_date = JSON.parse(localStorage.getItem("birth_date"));
            if (!birth_date) {
                birth_date = Date.now();
            } else {
                document.getElementById("birthday").value = birth_date;
            }
            translateAgeUi();
            setAge();
        }

        function set_birth() {
            birth_date = document.getElementById("birthday").value;
            localStorage.setItem("birth_date", JSON.stringify(birth_date));
            setAge();
        }

        var secondHand = document.querySelector('.second-hand');

        function getAge(dateString) {
            if (!dateString) return null;
            var now = new Date();
            var today = new Date(now.getYear(), now.getMonth(), now.getDate());

            var yearNow = now.getYear();
            var monthNow = now.getMonth();
            var dateNow = now.getDate();

            var dob = new Date(
                dateString.substring(0, 4),
                dateString.substring(5, 7),
                dateString.substring(8, 10)
            );

            var yearDob = dob.getYear();
            var monthDob = dob.getMonth();
            var dateDob = dob.getDate();

            var yearAge = yearNow - yearDob;
            var monthAge;

            if (monthNow >= monthDob)
                monthAge = monthNow - monthDob + 1;
            else {
                yearAge--;
                monthAge = 12 + monthNow - monthDob;
            }

            var dateAge;
            if (dateNow >= dateDob)
                dateAge = dateNow - dateDob;
            else {
                monthAge--;
                dateAge = 31 + dateNow - dateDob;
                if (monthAge < 0) {
                    monthAge = 11;
                    yearAge--;
                }
            }

            return { years: yearAge, months: monthAge, days: dateAge };
        }

        function getAgeString(age) {
            if (!age) return "";

            var y = age.years, m = age.months, d = age.days;
            var lang = (window.i18n && window.i18n.currentLang) || 'ar';

            // Arabic
            if (lang === 'ar') {
                var parts = [];
                if (y > 0) parts.push(y + " سنة" + (y > 1 ? "" : ""));
                if (m > 0) parts.push(m + " شهر" + (m > 1 ? "" : ""));
                if (d > 0) parts.push(d + " يوم" + (d > 1 ? "" : ""));
                if (parts.length === 0) return "لم يتم حساب العمر!";
                if (parts.length === 1) return parts[0];
                return parts.slice(0, -1).join(", ") + " و " + parts.slice(-1);
            }

            // English / others
            var yS = y === 1 ? "year" : "years";
            var mS = m === 1 ? "month" : "months";
            var dS = d === 1 ? "day" : "days";

            if (y > 0 && m > 0 && d > 0) return y + " " + yS + ", " + m + " " + mS + ", and " + d + " " + dS + " old.";
            if (y === 0 && m === 0 && d > 0) return "Only " + d + " " + dS + " old!";
            if (y > 0 && m === 0 && d === 0) return y + " " + yS + " old. Happy Birthday!!";
            if (y > 0 && m > 0 && d === 0) return y + " " + yS + " and " + m + " " + mS + " old.";
            if (y === 0 && m > 0 && d > 0) return m + " " + mS + " and " + d + " " + dS + " old.";
            if (y > 0 && m === 0 && d > 0) return y + " " + yS + " and " + d + " " + dS + " old.";
            if (y === 0 && m > 0 && d === 0) return m + " " + mS + " old.";
            return "Oops! Could not calculate age!";
        }

        function translateAgeUi() {
            if (window.i18n && window.i18n.translate) {
                var t = window.i18n.translate;
                var label = document.getElementById("label_text");
                if (label && t('age.label')) label.textContent = t('age.label');
                var title = document.querySelector('.age-title');
                if (title && t('age.title')) title.textContent = t('age.title');
            }
        }

        var delayed_exec;

        function setAge() {
            if (!birth_date) {
                delayed_exec = setInterval(setAge, 100);
                return;
            } else {
                if (delayed_exec) clearTimeout(delayed_exec);
            }
            var age = getAge(birth_date);
            if (!age) return;

            var seconds = (age.months * 30 + age.days) / 6;
            var mins = age.years % 60;
            var minsDegrees = ((mins / 60) * 360) + ((seconds / 60) * 6) + 90;
            secondHand.style.transform = 'rotate(' + minsDegrees + 'deg)';

            if (age.years > 1) {
                var label = document.getElementById("label_text");
                if (label) label.textContent = "";
            }

            document.getElementById("age_text").textContent = getAgeString(age);
        }

        setInterval(setAge, 1000 * 60 * 60 * 24);

        // Re-translate when i18n language changes
        document.addEventListener('i18nLanguageChanged', function () {
            translateAgeUi();
            setAge();
        });
    </script>

    <script>
        document.getElementById('appVersion').textContent = 'v' + window.APP_VERSION;
    </script>
</body>
