<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv=1782681227"X-UA-Compatible" content="ie=edge">
    <title data-i18n="auth.signupPageTitle">موقع أنوار القرآن - إنشاء حساب</title>
    <meta name="description" content="Create an account on Quran Lights to track your Quran recitation and review rates">
    <meta name="keywords" content="Quran Lights, Sign Up, Register, Create Account">

    <link rel="stylesheet" href="login/fonts/material-icon/css/material-design-iconic-font.min.css?v=1782681227">
    <link rel="stylesheet" href="login/css/auth.css?v=1782681227">
    <script src="dashboard/scripts/bugReport.js?v=1782681227"></script>
    <script src="https://www.gstatic.com/firebasejs/4.2.0/firebase.js"></script>
    <script>if (typeof firebase === "undefined") { document.write('<script src="js/lib/firebase.js"><\/script>'); }</script>
    <script src="js/constants.js?v=1782681227"></script>
    <script src="js/utils.js?v=1782681227"></script>
    <script src="login/js/login.js?v=1782681227"></script>
</head>

<body>

    <!-- Language Switcher -->
    <div class="lang-switcher" data-custom-lang-switcher>
        <div class="dropdown">
            <button class="lang-btn dropdown-toggle" id="langDropdown">
                <i class="zmdi zmdi-globe"></i>
                <span id="current-lang">العربية</span>
                <span class="arrow">&#9660;</span>
            </button>
            <ul class="dropdown-menu language-dropdown" id="langMenu">
                <li><a href="#" data-lang="ar">🇸🇦 العربية</a></li>
                <li><a href="#" data-lang="en">🇬🇧 English</a></li>
                <li><a href="#" data-lang="es">🇪🇸 Español</a></li>
                <li><a href="#" data-lang="fr">🇫🇷 Français</a></li>
                <li><a href="#" data-lang="de">🇩🇪 Deutsch</a></li>
                <li><a href="#" data-lang="zh">🇨🇳 中文</a></li>
                <li><a href="#" data-lang="hi">🇮🇳 हिन्दी</a></li>
                <li><a href="#" data-lang="pt">🇧🇷 Português</a></li>
                <li><a href="#" data-lang="ur">🇵🇰 اردو</a></li>
                <li><a href="#" data-lang="ja">🇯🇵 日本語</a></li>
            </ul>
        </div>
    </div>

    <div class="main">
        <section class="signup">
            <div class="container">
                <div class="signup-content">
                    <div class="signup-form">
                        <h2 class="form-title" data-i18n="auth.signupTitle">إنشاء حساب</h2>
                        <form method="POST" class="register-form" id="register-form">
                            <div class="form-group">
                                <label for="email"><i class="zmdi zmdi-email"></i></label>
                                <input type="email" name="email" id="email" data-i18n-attr="placeholder"
                                    data-i18n="auth.email" placeholder="البريد الالكتروني" />
                            </div>
                            <div class="form-group">
                                <label for="pass"><i class="zmdi zmdi-lock"></i></label>
                                <input type="password" name="pass" id="pass" data-i18n-attr="placeholder"
                                    data-i18n="auth.password" placeholder="كلمة المرور" />
                            </div>
                            <div class="form-group">
                                <label for="re-pass"><i class="zmdi zmdi-lock-outline"></i></label>
                                <input type="password" name="re_pass" id="re_pass" data-i18n-attr="placeholder"
                                    data-i18n="auth.repeatPassword" placeholder="تكرار كلمة المرور" />
                            </div>
                            <div class="form-group form-button">
                                <input type="button" name="signup" id="signup" class="form-submit"
                                    data-i18n-attr="value" data-i18n="auth.signUpButton" value="إنشاء الحساب"
                                    onclick="on_sign_up_button_pressed()" />
                                <input type="button" name="back" id="back" class="form-submit secondary"
                                    data-i18n-attr="value" data-i18n="auth.backToHome" value="الرجوع للصفحة الرئيسية"
                                    onclick="window.location.href='index.html'" />
                            </div>
                        </form>
                        <div class="social-login">
                            <span class="social-label" data-i18n="auth.orSignUpWith">أو إنشاء حساب من خلال حساب جوجل</span>
                            <ul class="socials">
                                <li><a href="#" onclick="sign_in_with_google()"><i
                                            class="display-flex-center zmdi zmdi-google"></i></a></li>
                            </ul>
                        </div>
                    </div>
                    <div class="signup-image">
                        <figure>
                            <img src="login/images/sign-up.jpg" alt="sing up image"
                                onclick="window.location.href='index.html'">
                        </figure>
                        <a href="login.html" class="signup-image-link" data-i18n="auth.signInLink">تسجيل الدخول</a>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Footer -->
    <div class="auth-footer">
        <span id="appVersion">v1.1.15</span>
        <span class="sep">|</span>
        <a href="https://amrlotfy.et3am.com" target="_blank" rel="noopener">Amr Lotfy</a>
        <span class="sep">|</span>
        <span>MIT License</span>
    </div>

    <script src="login/vendor/jquery/jquery.min.js?v=1782681227"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <script src="login/js/main.js?v=1782681227"></script>
    <script src="js/i18n.js?v=1782681227"></script>
    <script src="js/version.js?v=1782681227"></script>
    <script>
        document.getElementById('appVersion').textContent = 'v' + window.APP_VERSION;
        (function() {
            var dropdown = document.getElementById('langDropdown');
            var menu = document.getElementById('langMenu');
            var arrow = dropdown.querySelector('.arrow');

            dropdown.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                menu.classList.toggle('show');
                if (arrow) arrow.classList.toggle('open');
            });

            document.addEventListener('click', function(e) {
                if (!menu.contains(e.target) && !dropdown.contains(e.target)) {
                    menu.classList.remove('show');
                    if (arrow) arrow.classList.remove('open');
                }
            });

            menu.addEventListener('click', function(e) {
                var link = e.target.closest('a');
                if (link) {
                    e.preventDefault();
                    var lang = link.dataset.lang;
                    if (lang && window.i18n && window.i18n.switchLanguage) {
                        window.i18n.switchLanguage(lang);
                    }
                    menu.classList.remove('show');
                    if (arrow) arrow.classList.remove('open');
                }
            });
        })();

        function on_sign_up_button_pressed() {
            var email = document.getElementById("email").value;
            var password = document.getElementById("pass").value;
            var re_pass = document.getElementById("re_pass").value;

            if (password !== re_pass) {
                var errorMsg = window.i18n && window.i18n.getCurrentLanguage ?
                    (window.i18n.getTranslation ? window.i18n.getTranslation('auth.passwordMismatch') :
                        "Passwords mismatch, retype passwords") :
                    "Passwords mismatch, retype passwords";
                alert(errorMsg);
                return;
            }

            sign_up(email, password);
        }
    </script>
</body>

</html>
