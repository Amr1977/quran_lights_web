<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv=1781992553"X-UA-Compatible" content="ie=edge">
    <title data-i18n="auth.loginPageTitle">موقع أنوار القرآن - تسجيل الدخول</title>
    <meta name="description" content="Sign in to Quran Lights to track your Quran recitation and review rates">
    <meta name="keywords" content="Quran Lights, Sign In, Login, Authentication">

    <link rel="stylesheet" href="login/fonts/material-icon/css/material-design-iconic-font.min.css?v=1781992553">
    <link rel="stylesheet" href="login/css/style.css?v=1781992553">
    <link rel="stylesheet" href="login/css/auth.css?v=1781992553">
    <script src="dashboard/scripts/bugReport.js?v=1781992553"></script>
    <script src="https://www.gstatic.com/firebasejs/4.2.0/firebase.js"></script>
    <script src="js/constants.js?v=1781992553"></script>
    <script src="js/utils.js?v=1781992553"></script>
    <script src="login/js/login.js?v=1781992553"></script>
</head>

<body>

    <!-- Language Switcher -->
    <div class="lang-switcher" data-custom-lang-switcher>
        <div class="dropdown">
            <button class="lang-btn dropdown-toggle" id="langDropdown">
                <i class="zmdi zmdi-globe"></i>
                <span id="current-lang">العربية</span>
                <span class="arrow">&#9660;</span>
            </button>
            <ul class="dropdown-menu language-dropdown" id="langMenu">
                <li><a href="#" data-lang="ar">🇸🇦 العربية</a></li>
                <li><a href="#" data-lang="en">🇬🇧 English</a></li>
                <li><a href="#" data-lang="es">🇪🇸 Español</a></li>
                <li><a href="#" data-lang="fr">🇫🇷 Français</a></li>
                <li><a href="#" data-lang="de">🇩🇪 Deutsch</a></li>
                <li><a href="#" data-lang="zh">🇨🇳 中文</a></li>
                <li><a href="#" data-lang="hi">🇮🇳 हिन्दी</a></li>
                <li><a href="#" data-lang="pt">🇧🇷 Português</a></li>
                <li><a href="#" data-lang="ur">🇵🇰 اردو</a></li>
                <li><a href="#" data-lang="ja">🇯🇵 日本語</a></li>
            </ul>
        </div>
    </div>

    <div class="main">
        <section class="sign-in">
            <div class="container">
                <div class="signin-content">
                    <div class="signin-image">
                        <figure>
                            <img src="login/images/login-image.jpg" alt="sing up image"
                                onclick="window.location.href='index.html'">
                        </figure>
                        <a href="signup.html" class="signup-image-link" data-i18n="auth.createAccountLink">إنشاء حساب</a>
                    </div>
                    <div class="signin-form">
                        <h2 class="form-title" data-i18n="auth.loginTitle">تسجيل الدخول</h2>
                        <form method="POST" class="register-form" id="login-form">
                            <div class="form-group">
                                <label for="your_name"><i class="zmdi zmdi-account material-icons-name"></i></label>
                                <input type="text" name="your_name" id="your_name" data-i18n-attr="placeholder"
                                    data-i18n="auth.email" placeholder="Email" />
                            </div>
                            <div class="form-group">
                                <label for="your_pass"><i class="zmdi zmdi-lock"></i></label>
                                <input type="password" name="your_pass" id="your_pass" data-i18n-attr="placeholder"
                                    data-i18n="auth.password" placeholder="Password" />
                            </div>
                            <div class="form-group form-button">
                                <input type="button" name="signin" id="signin" class="form-submit"
                                    data-i18n-attr="value" data-i18n="auth.signInButton" value="تسجيل الدخول"
                                    onclick="on_sign_in_button_pressed()" />
                                <input type="button" name="back" id="back" class="form-submit secondary"
                                    data-i18n-attr="value" data-i18n="auth.backToHome" value="الرجوع للصفحة الرئيسية"
                                    onclick="window.location.href='index.html'" />
                            </div>
                        </form>
                        <div class="social-login">
                            <span class="social-label" data-i18n="auth.orSignInWith">أو تسجيل الدخول من خلال حساب جوجل</span>
                            <ul class="socials">
                                <li><a href="#" onclick="sign_in_with_google()"><i
                                            class="display-flex-center zmdi zmdi-google"></i></a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Footer -->
    <div class="auth-footer">
        <span>v1.1.0</span>
        <span class="sep">|</span>
        <a href="https://amrlotfy.et3am.com" target="_blank" rel="noopener">Amr Lotfy</a>
        <span class="sep">|</span>
        <span>MIT License</span>
    </div>

    <script src="login/vendor/jquery/jquery.min.js?v=1781992553"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <script src="login/js/main.js?v=1781992553"></script>
    <script src="js/i18n.js?v=1781992553"></script>
    <script>
        (function() {
            var dropdown = document.getElementById('langDropdown');
            var menu = document.getElementById('langMenu');
            var arrow = dropdown.querySelector('.arrow');

            dropdown.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                menu.classList.toggle('show');
                if (arrow) arrow.classList.toggle('open');
            });

            document.addEventListener('click', function(e) {
                if (!menu.contains(e.target) && !dropdown.contains(e.target)) {
                    menu.classList.remove('show');
                    if (arrow) arrow.classList.remove('open');
                }
            });

            menu.addEventListener('click', function(e) {
                var link = e.target.closest('a');
                if (link) {
                    e.preventDefault();
                    var lang = link.dataset.lang;
                    if (lang && window.i18n && window.i18n.switchLanguage) {
                        window.i18n.switchLanguage(lang);
                    }
                    menu.classList.remove('show');
                    if (arrow) arrow.classList.remove('open');
                }
            });
        })();

        function on_sign_in_button_pressed() {
            var email = document.getElementById("your_name").value;
            var password = document.getElementById("your_pass").value;
            sign_in(email, password);
        }
    </script>
</body>

</html>
