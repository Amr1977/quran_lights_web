name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Replace CDN URLs with local paths for offline
        run: |
          ASSETS=android/app/src/main/assets/public
          find "$ASSETS" -name '*.html' -exec sed -i \
            -e 's|https://ajax.googleapis.com/ajax/libs/jquery/2\.1\.3/jquery\.min\.js|js/lib/jquery.min.js|g' \
            -e 's|https://maxcdn\.bootstrapcdn\.com/bootstrap/3\.3\.7/js/bootstrap\.min\.js|js/lib/bootstrap.min.js|g' \
            -e 's|https://www\.gstatic\.com/firebasejs/4\.2\.0/firebase\.js|js/lib/firebase.js|g' \
            -e 's|https://code\.highcharts\.com/8\.0\.0/modules/|js/lib/|g' \
            -e 's|https://code\.highcharts\.com/8\.0\.0/themes/|js/lib/|g' \
            -e 's|https://code\.highcharts\.com/8\.0\.0/|js/lib/|g' \
            -e 's|https://cdnjs\.cloudflare\.com/ajax/libs/html2canvas/1\.4\.1/html2canvas\.min\.js|js/lib/html2canvas.min.js|g' \
            -e 's|https://cdnjs\.cloudflare\.com/ajax/libs/jspdf/2\.5\.1/jspdf\.umd\.min\.js|js/lib/jspdf.umd.min.js|g' \
            -e 's|https://code\.getmdl\.io/1\.1\.3/material\.orange-indigo\.min\.css|js/lib/material.orange-indigo.min.css|g' \
            -e 's|https://cdnjs\.cloudflare\.com/ajax/libs/animate\.css/3\.2\.0/animate\.min\.css|js/lib/animate.min.css|g' \
            {} +

      - name: Grant Gradle executable permission
        run: chmod +x android/gradlew

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: quran-lights-android
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

  electron:
    name: Electron (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Replace CDN URLs with local paths for offline
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            SED_OPTS=(-i '')
          else
            SED_OPTS=(-i)
          fi
          find public -name '*.html' -exec sed "${SED_OPTS[@]}" \
            -e 's|https://ajax.googleapis.com/ajax/libs/jquery/2\.1\.3/jquery\.min\.js|js/lib/jquery.min.js|g' \
            -e 's|https://maxcdn\.bootstrapcdn\.com/bootstrap/3\.3\.7/js/bootstrap\.min\.js|js/lib/bootstrap.min.js|g' \
            -e 's|https://www\.gstatic\.com/firebasejs/4\.2\.0/firebase\.js|js/lib/firebase.js|g' \
            -e 's|https://code\.highcharts\.com/8\.0\.0/modules/|js/lib/|g' \
            -e 's|https://code\.highcharts\.com/8\.0\.0/themes/|js/lib/|g' \
            -e 's|https://code\.highcharts\.com/8\.0\.0/|js/lib/|g' \
            -e 's|https://cdnjs\.cloudflare\.com/ajax/libs/html2canvas/1\.4\.1/html2canvas\.min\.js|js/lib/html2canvas.min.js|g' \
            -e 's|https://cdnjs\.cloudflare\.com/ajax/libs/jspdf/2\.5\.1/jspdf\.umd\.min\.js|js/lib/jspdf.umd.min.js|g' \
            -e 's|https://code\.getmdl\.io/1\.1\.3/material\.orange-indigo\.min\.css|js/lib/material.orange-indigo.min.css|g' \
            -e 's|https://cdnjs\.cloudflare\.com/ajax/libs/animate\.css/3\.2\.0/animate\.min\.css|js/lib/animate.min.css|g' \
            {} +

      - name: Build Electron app
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quran-lights-electron-${{ matrix.os }}
          path: dist-electron/*
          if-no-files-found: warn
